name: CI
 
on:
  pull_request:
    branches:
      - dev
 
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
 
      - name: Instalar dependencias
        run: npm ci
 
      - name: Build
        run: npm run build